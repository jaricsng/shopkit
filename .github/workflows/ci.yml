# CI pipeline template — lint/typecheck → test → security scan → build → smoke/E2E gate.
#
# This is a SHAPE to adopt, not a drop-in file. Before using it:
#   - Replace `working-directory: backend` / `frontend` with your own service dirs
#     (or delete the `frontend` job entirely for an API-only service).
#   - Replace the Python/Node toolchain versions and lint/test commands with your stack's.
#   - Replace `solution/infra/terraform/...` paths in terraform-plan with your IaC path,
#     or delete that job if you don't use Terraform.
#   - The smoke-test/e2e jobs assume `docker compose up` boots your whole stack and that
#     load-testing/k6/smoke.js (see ../../load-testing/) exists at the referenced path.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel superseded runs: when a teammate pushes a new commit to the same
# PR/branch, kill the in-progress CI run for the old commit instead of
# letting both finish — saves runner minutes when many PRs are open at once.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        # TODO: point at your backend service directory
        working-directory: backend

    services:
      # TODO: swap this image (and the connection env vars used below) if
      # your backend uses a different engine — see docs/TECH-STACK-SWAP-GUIDE.md
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: apppass
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check formatting (black)
        run: black --check .

      - name: Check import order (isort)
        run: isort --check .

      - name: Lint (ruff)
        run: ruff check .

      - name: Run unit tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-fail-under=70
        env:
          # Sync SQLAlchemy + psycopg (this service isn't async). Unit tests use
          # a SQLite override; the app still builds its engine from this.
          DATABASE_URL: postgresql+psycopg://appuser:apppass@localhost:5432/appdb
          SECRET_KEY: ci-test-secret-key-at-least-32-bytes-long
          ENVIRONMENT: test
          OTEL_ENABLED: "false"

      - name: Run integration tests (real Postgres)
        run: pytest -m integration
        env:
          DATABASE_URL: postgresql+psycopg://appuser:apppass@localhost:5432/appdb
          SECRET_KEY: ci-test-secret-key-at-least-32-bytes-long
          OTEL_ENABLED: "false"

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend:
    name: Frontend — typecheck + lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        # TODO: point at your frontend directory, or delete this job
        working-directory: frontend

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/

  security:
    name: Security scan
    runs-on: ubuntu-latest
    # Run on every push and PR — shift-left means catching issues before merge
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history for git-based secret scanning

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dev dependencies
        run: pip install -e ".[dev]"
        working-directory: backend

      - name: SAST — bandit (Python)
        # -ll = medium-and-above severity; exits non-zero on any finding
        run: bandit -r app/ -c pyproject.toml -ll
        working-directory: backend

      - name: Dependency CVEs — pip-audit (Python)
        run: pip-audit --desc --format columns
        working-directory: backend

      - name: License compliance — Python (no strong copyleft)
        # Fail on GPL/AGPL; LGPL (psycopg) and MPL (certifi) are allowed.
        run: pip-licenses --fail-on="GPL-3.0-only;GPL-3.0-or-later;GPL-2.0-only;GPL-2.0-or-later;AGPL-3.0-only;AGPL-3.0-or-later"
        working-directory: backend

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Dependency CVEs — npm audit (JavaScript)
        # --audit-level=high: only fail on high/critical CVEs
        run: npm audit --audit-level=high
        working-directory: frontend

      - name: License compliance — JS (permissive only)
        # Third-party production deps must be permissive; skip our own private pkg.
        run: npx --yes license-checker --production --excludePrivatePackages --onlyAllow 'MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0;0BSD;CC0-1.0;Unlicense;BlueOak-1.0.0;Python-2.0'
        working-directory: frontend

      - name: Secret pattern scan
        # Grep tracked files for common secret patterns; exits non-zero on a match.
        run: |
          git ls-files | grep -v 'node_modules\|\.lock$\|\.png$\|\.jpg$\|docs/' | \
            xargs grep -lnE \
              'AKIA[0-9A-Z]{16}|ghp_[a-zA-Z0-9]{36,}|sk-[a-zA-Z0-9]{32,}' \
              2>/dev/null && echo "❌ Secret patterns found — see above" && exit 1 || \
            echo "✅ No secret patterns found in tracked files"

  migration-safety:
    name: DB migration safety (expand/contract)
    runs-on: ubuntu-latest
    # Flags backward-incompatible schema changes (DROP COLUMN, SET NOT NULL,
    # renames) that break the old app version still running during a rolling
    # deploy. No-ops if the repo has no migrations or no check script.
    # See docs/DATABASE-MIGRATIONS.md.
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check migrations
        run: |
          if [ -f tools/check_migrations.py ]; then
            python3 tools/check_migrations.py backend/alembic/versions
          else
            echo "tools/check_migrations.py not found — skipping. Re-scaffold with tools/scaffold.py to get it."
          fi

  golden-path-check:
    name: Golden-path readiness (tools/doctor.py)
    runs-on: ubuntu-latest
    # Enforces docs/ARCHITECTURE-FIT.md's checklist on every push/PR, not
    # just once at scaffold time — catches drift (secrets later committed,
    # an unresolved catalog-info.yaml owner, tests deleted) before merge
    # instead of relying on someone remembering to run it by hand.
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run readiness check
        run: |
          if [ -f tools/doctor.py ]; then
            python3 tools/doctor.py .
          else
            echo "tools/doctor.py not found — skipping. Re-scaffold with tools/scaffold.py to get it, or run docs/ARCHITECTURE-FIT.md's checklist by hand."
          fi

  docker-build:
    name: Docker Compose build
    runs-on: ubuntu-latest
    needs: [backend, frontend]   # only build images after tests pass — fail fast
    env:
      COMPOSE_PROJECT_NAME: shopkit   # deterministic image names for the scan below
    steps:
      - uses: actions/checkout@v7
      - name: Build all images
        run: docker compose build

      # Scan the built images for OS/library CVEs BEFORE merge (shift-left).
      # ignore-unfixed = only fail on CVEs that actually have a fix available.
      - name: Scan API image (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: shopkit-app
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Scan frontend image (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: shopkit-frontend
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  smoke-test:
    name: k6 smoke test
    runs-on: ubuntu-latest
    needs: [docker-build]
    # Smoke test only on PRs to main — verifies the full user journey before merge
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    steps:
      - uses: actions/checkout@v7

      - name: Start full stack
        run: docker compose up -d
        env:
          SECRET_KEY: ci-smoke-test-secret-key

      - name: Wait for API to be healthy
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && echo "API ready" && exit 0
            echo "Waiting for API (attempt $i)…"
            sleep 3
          done
          echo "❌ API did not start in time" && exit 1

      - name: Run k6 smoke test
        run: |
          docker run --rm --network host \
            -v "${{ github.workspace }}/load-testing/k6:/scripts" \
            grafana/k6 run /scripts/smoke.js

      - name: Tear down stack
        if: always()
        run: docker compose down

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    # E2E only runs on PRs to main to keep push pipelines fast
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    needs: [smoke-test]   # only run full E2E if smoke test passed
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start full stack
        run: docker compose up -d
        working-directory: ${{ github.workspace }}
        env:
          SECRET_KEY: ci-e2e-test-secret-key

      - name: Wait for API to be healthy
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && echo "API ready" && exit 0
            echo "Waiting for API (attempt $i)…"
            sleep 3
          done
          echo "❌ API did not start in time" && exit 1

      - name: Wait for frontend to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5173 && echo "Frontend ready" && exit 0
            echo "Waiting for frontend (attempt $i)…"
            sleep 3
          done
          echo "❌ Frontend did not start in time" && exit 1

      - name: Run E2E tests
        run: npm run e2e
        env:
          VITE_API_URL: http://localhost:8000

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  terraform-plan:
    name: Terraform plan + tfsec
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write    # to post the plan output as a PR comment
    # Only run on PRs; tfsec runs for all PRs (no cloud credentials needed),
    # terraform plan requires cloud auth and remote state configured.
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9"

      - name: tfsec IaC security scan
        # Static analysis of all Terraform HCL — no cloud credentials required.
        # soft_fail: true means findings are reported but do not fail the build.
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          # TODO: point at your Terraform root
          working_directory: iac-terraform/gcp-cloud-run
          soft_fail: true

      # The cloud steps below only run once you've configured GCP Workload
      # Identity and set the repo variable ENABLE_TERRAFORM_PLAN=true. Without
      # creds, `terraform plan` HANGS on metadata/auth timeouts (continue-on-error
      # still leaves the job stalled for minutes), so we skip rather than hang.
      # tfsec above always runs — it needs no credentials.
      - name: Authenticate to cloud (Workload Identity — keyless)
        if: vars.ENABLE_TERRAFORM_PLAN == 'true'
        # TODO: replace with your cloud provider's auth action (AWS/Azure/GCP)
        # and add the corresponding secrets in repo settings.
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        continue-on-error: true   # allow tfsec results to be posted even without cloud auth set up

      - name: Terraform init
        if: vars.ENABLE_TERRAFORM_PLAN == 'true'
        run: terraform init
        # TODO: point at your environment directory (e.g. environments/staging)
        working-directory: iac-terraform/gcp-cloud-run
        continue-on-error: true   # non-blocking until cloud auth is configured

      - name: Terraform plan
        if: vars.ENABLE_TERRAFORM_PLAN == 'true'
        id: plan
        run: |
          terraform plan -no-color -out=tfplan.binary \
            -var="image_tag=sha-${{ github.sha }}" \
            -var="secret_key=placeholder"
        working-directory: iac-terraform/gcp-cloud-run
        continue-on-error: true   # plan output is informational on PRs

      # Policy-as-code gate (OSS baseline) — ACTIVE in report mode by default:
      # it runs and prints violations, but continue-on-error keeps it from
      # blocking until you've adapted the rules. To HARD-GATE (block the PR on
      # a policy failure): remove the `continue-on-error: true` line below.
      # No-ops if the policy folder isn't present. See
      # governance/policy-as-code/README.md.
      - name: Setup conftest
        if: vars.ENABLE_TERRAFORM_PLAN == 'true'
        run: |
          CONFTEST_VERSION=0.56.0
          curl -sSL "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            | tar xz -C /tmp conftest
          sudo mv /tmp/conftest /usr/local/bin/

      - name: Conftest policy-as-code gate (report mode)
        if: vars.ENABLE_TERRAFORM_PLAN == 'true'
        run: |
          if [ -d ../../governance/policy-as-code/policy ]; then
            terraform show -json tfplan.binary > tfplan.json
            conftest test --policy ../../governance/policy-as-code/policy tfplan.json
          else
            echo "governance/policy-as-code/policy not found — skipping policy gate."
          fi
        working-directory: iac-terraform/gcp-cloud-run
        continue-on-error: true   # remove this line to hard-gate the PR on a policy violation

      - name: Post plan as PR comment
        if: always() && vars.ENABLE_TERRAFORM_PLAN == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const planOutput = `${{ steps.plan.outputs.stdout }}` || '(plan step skipped — cloud credentials not configured)';
            const output = `#### Terraform Plan\n\`\`\`\n${planOutput}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
