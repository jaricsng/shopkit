# Disaster-recovery test — rebuild the whole stack from code + migrations and
# measure time-to-ready against an RTO budget. This is the genuinely-automatable
# DR control: it proves the environment is reproducible (Cloud Run is stateless;
# schema comes from Alembic; data from seed) and times the rebuild.
#
# A REAL backup restore (Cloud SQL snapshot → instance) needs cloud creds and is
# the human-signed-off part — see .github/compliance/dr-review.md. This covers
# the "rebuild from code" row of the DR test log.
name: DR restore test

on:
  schedule:
    - cron: "0 6 1 * *" # monthly, 1st @ 06:00 UTC
  workflow_dispatch:
    inputs:
      rto_seconds:
        description: RTO budget in seconds (fail if rebuild takes longer)
        type: string
        default: "600"

permissions:
  contents: read

jobs:
  rebuild-from-code:
    name: Rebuild stack + measure RTO
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild from code + migrations, measure time-to-ready
        env:
          RTO_BUDGET: ${{ github.event.inputs.rto_seconds || '600' }}
          OTEL_ENABLED: "false"
        run: |
          set -euo pipefail
          start=$(date +%s)
          docker compose up -d --build
          ready=""
          for _ in $(seq 1 90); do
            if curl -sf http://localhost:8000/ready >/dev/null 2>&1; then ready=1; break; fi
            sleep 2
          done
          elapsed=$(( $(date +%s) - start ))
          echo "Time-to-ready: ${elapsed}s (RTO budget: ${RTO_BUDGET}s)"
          if [ -z "$ready" ]; then echo "::error::stack never became ready"; exit 1; fi
          # Prove the data layer rebuilt (migrations applied + catalog seeded).
          total=$(curl -sf "http://localhost:8000/products?page_size=1" | python3 -c "import sys,json;print(json.load(sys.stdin)['total'])")
          echo "Catalog rows after rebuild: ${total}"
          [ "$total" -gt 0 ] || { echo "::error::data layer did not rebuild (no products)"; exit 1; }
          if [ "$elapsed" -le "$RTO_BUDGET" ]; then
            echo "✅ Rebuilt within RTO budget"
          else
            echo "::error::rebuild exceeded RTO budget (${elapsed}s > ${RTO_BUDGET}s)"; exit 1
          fi
          {
            echo "## DR rebuild-from-code test"
            echo "- Time-to-ready: **${elapsed}s** (budget ${RTO_BUDGET}s)"
            echo "- Catalog rows after rebuild: **${total}**"
            echo "- Result: PASS"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Tear down
        if: always()
        run: docker compose down -v || true
