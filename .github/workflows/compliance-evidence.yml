# Compliance evidence snapshot — periodically collect the artifacts an auditor
# asks for (dependency audits, license inventory, SAST, SBOMs) and upload them as
# a dated, retained artifact. Evidence as a byproduct of automation, not a
# scramble before the audit. Gating still lives in the CI `security` job; this is
# archival/point-in-time, so scans here are best-effort (|| true) — we record
# findings, we don't fail the snapshot on them.
name: Compliance evidence snapshot

on:
  schedule:
    - cron: "0 7 1 * *" # monthly, 1st @ 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Collect evidence
        run: |
          set -uo pipefail
          mkdir -p evidence
          stamp=$(date -u +%Y-%m-%d)
          # --- Python (backend) ---
          pip install -e "./backend[dev]" >/dev/null 2>&1
          pip-audit -f json -o evidence/python-audit.json || true
          pip-audit -f cyclonedx-json -o evidence/sbom-python.cdx.json || true
          pip-licenses --format=json --output-file evidence/python-licenses.json || true
          bandit -r backend/app -f json -o evidence/python-sast-bandit.json -ll || true
          # --- JS (frontend) ---
          (cd frontend && npm ci >/dev/null 2>&1 && npm audit --json > ../evidence/js-audit.json) || true
          (cd frontend && npx --yes @cyclonedx/cyclonedx-npm --output-file ../evidence/sbom-frontend.cdx.json) || true
          (cd frontend && npx --yes license-checker --production --json > ../evidence/js-licenses.json) || true
          # --- Manifest ---
          {
            echo "# Compliance evidence — $stamp"
            echo ""
            echo "Repo: ${GITHUB_REPOSITORY} @ ${GITHUB_SHA}"
            echo "Generated by: .github/workflows/compliance-evidence.yml (run ${GITHUB_RUN_ID})"
            echo ""
            echo "## Contents"
            find evidence -maxdepth 1 -type f -printf '- %f\n' | sort
          } > evidence/MANIFEST.md
          {
            echo "## Evidence snapshot $stamp"
            find evidence -maxdepth 1 -type f -printf '- %f\n' | sort
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload evidence (retained 365 days)
        uses: actions/upload-artifact@v7
        with:
          name: compliance-evidence
          path: evidence/
          retention-days: 365
