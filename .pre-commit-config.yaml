# Pre-commit security + Python quality baseline — shift-left feedback before
# a commit ever reaches main (the no-commit-to-branch hook also blocks direct
# commits to main outright).
#
# TODO: the `files:` patterns below assume your Python source lives under
# `backend/`. Adjust each `files: ^backend/...` to match your tree
# (or remove the `files:` filter to apply repo-wide).
#
# The Terraform hooks need `terraform` and `tfsec` available locally (the
# devcontainer + .tool-versions provide terraform; `brew install tfsec` for
# tfsec). They only run when *.tf files are staged, so non-IaC repos are
# unaffected.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key        # catches PEM private keys
      - id: no-commit-to-branch       # prevent direct commits to main
        args: ["--branch", "main"]

  # ── Secrets detection ─────────────────────────────────────────────────────
  # detect-secrets scans staged files for credential patterns (API keys,
  # passwords, tokens). Run `detect-secrets scan > .secrets.baseline` once to
  # create a baseline, then commit the baseline so known false-positives are
  # remembered across the team.
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: package-lock\.json

  # ── Python SAST ───────────────────────────────────────────────────────────
  # bandit runs on staged Python files and blocks commits containing
  # medium-or-above security issues (SQL injection, hardcoded passwords, etc.)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        files: ^backend/app/
        args: ["-c", "backend/pyproject.toml", "-ll"]
        # -ll = medium-and-above severity only (low is too noisy for pre-commit)

  # ── Python formatting + linting ───────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        files: ^backend/

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        files: ^backend/
        args: ["--profile", "black"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        files: ^backend/

  # ── Infrastructure-as-Code (shift-left for Terraform) ─────────────────────
  # fmt + validate + tfsec run on staged *.tf so IaC misconfig and style hit
  # before check-in, not just in CI. Conftest stays CI-only — it needs a
  # `terraform plan`, which isn't available at commit time.
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tfsec

  # ── DB migration safety (shift-left for schema changes) ───────────────────
  # Runs the same gate as ci.yml's migration-safety job, locally, before
  # commit. See docs/DATABASE-MIGRATIONS.md.
  - repo: local
    hooks:
      - id: check-migrations
        name: DB migration safety (expand/contract)
        entry: python3 tools/check_migrations.py
        language: system
        pass_filenames: false
        files: (migrations/|alembic/versions/|db/migrate/|prisma/migrations/)
